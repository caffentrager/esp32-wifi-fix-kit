; ESP32-C3 WiFi fix-kit demo.
; SuperMini clones enumerate as native-USB-CDC only; if flashing/serial
; monitor doesn't attach, these two build_flags are usually why.
[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
